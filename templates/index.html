<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churner AI | Customer Insight</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Netflix-inspired custom dark theme */
        body {
            background-color: #141414;
            color: #e5e5e5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .netflix-red {
            background-color: #E50914;
        }
        .netflix-red-text {
            color: #E50914;
        }
        .form-input {
            background-color: #333333;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }
        .form-input:focus {
            outline: none;
            border-color: #E50914;
            background-color: #454545;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- Header -->
    <header class="w-full max-w-4xl flex items-center justify-between mb-10 mt-4">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-film-strip text-4xl netflix-red-text"></i>
            <h1 class="text-3xl font-bold tracking-wider">CHURNER <span class="netflix-red-text font-black">AI</span></h1>
        </div>
        <p class="text-gray-400 text-sm">Predictive Customer Analytics</p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-4xl bg-black/60 rounded-xl p-8 border border-gray-800 shadow-2xl">
        <h2 class="text-xl mb-6 font-semibold border-b border-gray-800 pb-2">Customer Profile</h2>
        
        <form id="predictForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Numerical Inputs -->
            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Age</label>
                <input type="number" id="age" required class="form-input p-3" placeholder="e.g. 34">
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Watch Hours (Total)</label>
                <input type="number" step="0.1" id="watch_hours" required class="form-input p-3" placeholder="e.g. 14.5">
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Last Login (Days Ago)</label>
                <input type="number" id="last_login_days" required class="form-input p-3" placeholder="e.g. 5">
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Monthly Fee ($)</label>
                <input type="number" step="0.01" id="monthly_fee" required class="form-input p-3" placeholder="e.g. 13.99">
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Number of Profiles</label>
                <input type="number" id="number_of_profiles" required class="form-input p-3" placeholder="e.g. 3">
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Avg Watch Time / Day</label>
                <input type="number" step="0.01" id="avg_watch_time_per_day" required class="form-input p-3" placeholder="e.g. 1.2">
            </div>

            <!-- Categorical Inputs -->
            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Gender</label>
                <select id="gender" class="form-input p-3">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Subscription Type</label>
                <select id="subscription_type" class="form-input p-3">
                    <option value="Basic">Basic</option>
                    <option value="Standard">Standard</option>
                    <option value="Premium">Premium</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Region</label>
                <select id="region" class="form-input p-3">
                    <option value="North America">North America</option>
                    <option value="South America">South America</option>
                    <option value="Europe">Europe</option>
                    <option value="Asia">Asia</option>
                    <option value="Africa">Africa</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Device</label>
                <select id="device" class="form-input p-3">
                    <option value="TV">TV</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Laptop">Laptop</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Payment Method</label>
                <select id="payment_method" class="form-input p-3">
                    <option value="Credit Card">Credit Card</option>
                    <option value="PayPal">PayPal</option>
                    <option value="Gift Card">Gift Card</option>
                    <option value="Crypto">Crypto</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1 uppercase tracking-wider">Favorite Genre</label>
                <select id="favorite_genre" class="form-input p-3">
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Documentary">Documentary</option>
                    <option value="Horror">Horror</option>
                    <option value="Romance">Romance</option>
                </select>
            </div>

            <div class="col-span-1 md:col-span-2 lg:col-span-3 mt-4">
                <button type="submit" id="submitBtn" class="w-full netflix-red hover:bg-red-700 text-white font-bold py-4 rounded transition-colors flex justify-center items-center gap-2">
                    <i class="ph-bold ph-magic-wand text-xl"></i> Run Prediction
                </button>
            </div>
        </form>

        <!-- Results Section -->
        <div id="resultContainer" class="hidden mt-8 p-6 rounded-lg text-center border">
            <h3 class="text-lg text-gray-300 mb-2 uppercase tracking-wide">Prediction Result</h3>
            <div id="predictionText" class="text-4xl font-bold mb-2"></div>
            <p id="probabilityText" class="text-gray-400 text-sm"></p>
        </div>

    </main>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Analyzing...';
            btn.disabled = true;

            // Gather Data
            const payload = {
                age: parseFloat(document.getElementById('age').value),
                watch_hours: parseFloat(document.getElementById('watch_hours').value),
                last_login_days: parseFloat(document.getElementById('last_login_days').value),
                monthly_fee: parseFloat(document.getElementById('monthly_fee').value),
                number_of_profiles: parseFloat(document.getElementById('number_of_profiles').value),
                avg_watch_time_per_day: parseFloat(document.getElementById('avg_watch_time_per_day').value),
                gender: document.getElementById('gender').value,
                subscription_type: document.getElementById('subscription_type').value,
                region: document.getElementById('region').value,
                device: document.getElementById('device').value,
                payment_method: document.getElementById('payment_method').value,
                favorite_genre: document.getElementById('favorite_genre').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    resultContainer.classList.remove('hidden', 'border-red-500', 'border-green-500', 'border-gray-800');
                    resultContainer.classList.add(data.is_churn ? 'border-red-500' : 'border-green-500', 'bg-black/80');
                    
                    document.getElementById('predictionText').innerText = data.prediction;
                    document.getElementById('predictionText').className = `text-4xl font-bold mb-2 ${data.is_churn ? 'text-red-500' : 'text-green-500'}`;
                    
                    document.getElementById('probabilityText').innerText = `Churn Probability: ${data.churn_probability}%`;
                } else {
                    alert('Error: ' + data.error);
                }

            } catch (error) {
                alert('Connection error. Is the Flask server running?');
            } finally {
                btn.innerHTML = '<i class="ph-bold ph-magic-wand text-xl"></i> Run Prediction';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
